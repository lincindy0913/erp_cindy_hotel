# ERP app + PostgreSQL + pgAdmin
services:
  app:
    build: .
    container_name: erp_cindy
    ports:
      - "3000:3000"
    volumes:
      - ./backup-data:/app/backup-data
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required — set your Railway PostgreSQL URL in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  ocr:
    build: ./ocr-service
    container_name: erp_ocr
    ports:
      - "5001:5001"
    environment:
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:?GOOGLE_VISION_API_KEY is required — set your Google Vision API key in .env}
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin-data:
