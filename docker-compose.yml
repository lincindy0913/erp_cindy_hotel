services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # 備份寫入本機，重建容器後仍可保留／還原
      - ./backup-data:/app/backup-data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://erp:erp_secret@db:5432/erp
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - BACKUP_ROOT=/app/backup-data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=erp
      - POSTGRES_PASSWORD=erp_secret
      - POSTGRES_DB=erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
