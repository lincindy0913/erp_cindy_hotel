name: Notify Business Alerts

on:
  schedule:
    # 每天 01:30 UTC（台灣時間 09:30），支票到期/逾期、貸款還款/到期提醒
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  notify-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify secrets
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "❌ APP_URL or CRON_SECRET not set"
            exit 1
          fi
          echo "✅ Secrets OK"
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Trigger business alerts notification
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$APP_URL/api/cron/notify-alerts" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP_CODE | $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed with HTTP $HTTP_CODE"
            exit 1
          fi

          ALERTS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('totalAlerts',0))" 2>/dev/null || echo "?")
          echo "✅ 推播 $ALERTS 種警示"
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
