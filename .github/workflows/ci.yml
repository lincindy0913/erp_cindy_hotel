# CI：Lint + 單元/API 測試 + Build + Playwright 煙霧測試
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & API tests (Vitest)
        run: npm test

      - name: Generate Prisma client & build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-build-placeholder-secret-at-least-32-chars-long
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E smoke (Playwright)
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-build-placeholder-secret-at-least-32-chars-long
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
        run: |
          npx next start -p 3000 &
          echo $! > .next_server.pid
          npx wait-on -t 120000 http://127.0.0.1:3000/api/health
          npx playwright test
          kill $(cat .next_server.pid) || true
