# CI：Lint + 單元/API 測試 + Build
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & API tests (Vitest)
        run: npm test

      - name: Generate Prisma client & build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-build-placeholder-secret-at-least-32-chars-long
        run: npm run build
