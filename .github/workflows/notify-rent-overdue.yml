name: Notify Rent Overdue

on:
  schedule:
    # 每天 01:00 UTC（台灣時間 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  notify-rent-overdue:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify secrets
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ APP_URL is not set in GitHub Secrets"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "❌ CRON_SECRET is not set in GitHub Secrets"
            exit 1
          fi
          echo "✅ Secrets verified"
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Trigger rent overdue notification
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$APP_URL/api/cron/notify-rent-overdue" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Cron job failed with HTTP $HTTP_CODE"
            exit 1
          fi

          COUNT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('overdueCount',0))" 2>/dev/null || echo "?")
          NOTIFIED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('notified',0))" 2>/dev/null || echo "?")
          echo "✅ 逾期租金 $COUNT 筆，已推播 $NOTIFIED 位使用者"
          echo "overdue_count=$COUNT" >> $GITHUB_OUTPUT
          echo "notified=$NOTIFIED" >> $GITHUB_OUTPUT
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
