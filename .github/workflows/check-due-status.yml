name: Check Due Status Cron

on:
  schedule:
    # 每天 16:05 UTC（台灣時間 00:05）
    - cron: '5 16 * * *'
  workflow_dispatch:

jobs:
  check-due-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify secrets
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ APP_URL is not set in GitHub Secrets"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "❌ CRON_SECRET is not set in GitHub Secrets"
            exit 1
          fi
          echo "✅ Secrets verified, calling $APP_URL/api/cron/check-due-status"
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Trigger check due status update
        id: update
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$APP_URL/api/cron/check-due-status" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Cron job failed with HTTP $HTTP_CODE"
            exit 1
          fi

          COUNT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['updatedCount'])" 2>/dev/null || echo "?")
          echo "✅ 支票到期狀態更新完成，共更新 $COUNT 筆"
          echo "updated_count=$COUNT" >> $GITHUB_OUTPUT
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Summary
        run: |
          echo "## 支票到期狀態更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "更新筆數：${{ steps.update.outputs.updated_count }}" >> $GITHUB_STEP_SUMMARY
